<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)" stroke="url(#ring)" stroke-width="2.5"/>
  <!-- Rock (top) -->
  <circle cx="32" cy="14" r="5.5" fill="none" stroke="#10b981" stroke-width="2" opacity="0.9"/>
  <circle cx="32" cy="14" r="2" fill="#10b981" opacity="0.6"/>
  <!-- Paper (bottom-left) -->
  <rect x="10" y="38" width="11" height="14" rx="1.5" fill="none" stroke="#10b981" stroke-width="2" opacity="0.9" transform="rotate(-10 15.5 45)"/>
  <line x1="13" y1="42" x2="20" y2="41" stroke="#10b981" stroke-width="1" opacity="0.4"/>
  <line x1="13.5" y1="45.5" x2="20.5" y2="44.5" stroke="#10b981" stroke-width="1" opacity="0.4"/>
  <!-- Scissors (bottom-right) -->
  <g transform="translate(47, 44)" opacity="0.9">
    <line x1="-4" y1="-8" x2="4" y2="4" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
    <line x1="4" y1="-8" x2="-4" y2="4" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
    <circle cx="-5" cy="-10" r="3" fill="none" stroke="#10b981" stroke-width="1.5"/>
    <circle cx="5" cy="-10" r="3" fill="none" stroke="#10b981" stroke-width="1.5"/>
  </g>
  <!-- Connecting triangle (subtle) -->
  <path d="M32 22 L19 40 L45 40 Z" fill="none" stroke="#10b981" stroke-width="0.5" opacity="0.2"/>
</svg>
